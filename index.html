<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wander</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="left">
            <h1>
                <span class="flip-container">
                    <span class="flip-words">
                        <span>Discover</span>
                        <span>Ontdek</span>
                        <span>Fumanisa</span>
                        <span>Thola</span>
                        <span>Utolla</span>
                        <span>Sibolla</span>
                        <span>Lemoga</span>
                        <span>Tfola</span>
                        <span>Wanulusa</span>
                        <span>Kuma</span>
                        <span>Thola</span>
                        <span>Discover</span>
                    </span>
                </span>
            </h1>
            <nav>
                <ul class="nav_links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Destinations</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">About us</a></li>
                </ul>
            </nav>
        </div>
        <div class="right">
            <search>
                <form id="searchForm" class="search-form" action="/search" method="GET">
                    <div class="search-box">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <path
                                d="M9.5 3a6.5 6.5 0 0 1 5.17 10.44l5.44 5.45-1.42 1.41-5.44-5.44A6.5 6.5 0 1 1 9.5 3m0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z" />
                        </svg>
                        <input type="search" id="searchQuery" name="q"
                            placeholder="Search for a place, city, or destination"
                            aria-label="Search through site content" required>
                    </div>
                </form>
                <button class="search-icon-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
            </search>
            <a class="bookBtn" href="#"><button>Book <span class="btn-full">now</span></button></a>
        </div>
    </header>
    <div class="image-sandwich-container">
        <div class="sandwich-heading-layer">
            <h1 class="sandwich-text">Wander</h1>
            <img class="sandwich-logo" src="img/logo.png">
        </div>


        <!-- The transparent cutout of the subject -->
        <img src="img/subject.png" alt="Subject Cutout" class="subject-layer">

        <div class="sandwich-front-text">
            <p>Discover South Africa through culture, coastlines, and unforgettable local routes.</p>
            <button>Explore Tours</button>
            <button class="planbtn">Plan your trip</button>
        </div>
    </div>
</body>

</html>
